services:
  # Redis - backend de cache
  redis:
    image: redis:7-alpine
    container_name: tarea1_redis
    command: >
      redis-server
      --maxmemory ${REDIS_MAX_MEMORY:-200mb}
      --maxmemory-policy ${REDIS_EVICTION_POLICY:-allkeys-lru}
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Generador de Respuestas - carga CSV en memoria y procesa Q1-Q5
  generador_respuestas:
    build: ./generador_respuestas
    container_name: tarea1_gen_respuestas
    volumes:
      - ./data:/app/data:ro
    environment:
      DATA_PATH: /app/data/buildings_rm.csv
      PORT: 5001
    ports:
      - "5002:5001"

  # Servicio de Metricas - almacena hits/misses/latencias en RAM
  metricas:
    build: ./metricas
    container_name: tarea1_metricas
    environment:
      PORT: 5002
    ports:
      - "5004:5002"

  # Cache API - intermediaria entre trafico y generador_respuestas, usa Redis
  cache_api:
    build: ./cache_api
    container_name: tarea1_cache_api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RESPONSE_GEN_URL: http://generador_respuestas:5001
      METRICAS_URL: http://metricas:5002
      CACHE_TTL: ${CACHE_TTL:-60}
      PORT: 5000
    ports:
      - "5003:5000"
    depends_on:
      redis:
        condition: service_healthy
      generador_respuestas:
        condition: service_started
      metricas:
        condition: service_started

  # Generador de Trafico (Zipf)
  trafico_zipf:
    build: ./generador_trafico
    container_name: tarea1_trafico_zipf
    environment:
      CACHE_URL: http://cache_api:5000
      DISTRIBUTION: zipf
      TOTAL_QUERIES: ${TOTAL_QUERIES:-100000}
      QUERIES_PER_SECOND: ${QPS:-1000}
    depends_on:
      cache_api:
        condition: service_started
    profiles:
      - zipf

  # Generador de Trafico (Uniforme)
  trafico_uniform:
    build: ./generador_trafico
    container_name: tarea1_trafico_uniform
    environment:
      CACHE_URL: http://cache_api:5000
      DISTRIBUTION: uniform
      TOTAL_QUERIES: ${TOTAL_QUERIES:-30000}
      QUERIES_PER_SECOND: ${QPS:-1000}
    depends_on:
      cache_api:
        condition: service_started
    profiles:
      - uniform