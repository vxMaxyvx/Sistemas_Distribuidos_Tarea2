services:
  redis:
    image: redis:7-alpine
    container_name: tarea1_redis
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-200mb}
      --maxmemory-policy ${REDIS_POLICY_NATIVE:-allkeys-lru}
      --maxmemory-samples 10
      --save ""
      --appendonly no
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: bitnami/kafka:3.4.0
    container_name: tarea2_kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes

  generador_respuestas:
    build: ./generador_respuestas
    container_name: tarea1_gen_respuestas
    environment:
      DATA_PATH: /app/data/buildings_rm.csv
      SIM_LATENCY_MIN_MS: ${SIM_LATENCY_MIN_MS:-30}
      SIM_LATENCY_MAX_MS: ${SIM_LATENCY_MAX_MS:-120}
    volumes:
      - ./data:/app/data:ro
    ports:
      - "5001:5001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache_api:
    build: ./cache_api
    container_name: tarea1_cache_api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RESPONSE_GEN_URL: http://generador_respuestas:5001
      METRICAS_URL: http://metricas:5002
      CACHE_POLICY: ${CACHE_POLICY:-LRU}
      CACHE_TTL_SEC: ${CACHE_TTL_SEC:-300}
      TTL_Q1: ${TTL_Q1:-300}
      TTL_Q2: ${TTL_Q2:-300}
      TTL_Q3: ${TTL_Q3:-180}
      TTL_Q4: ${TTL_Q4:-120}
      TTL_Q5: ${TTL_Q5:-600}
      USE_KAFKA: ${USE_KAFKA:-false}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "5000-5005:5000"
    depends_on:
      redis:
        condition: service_healthy
      generador_respuestas:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  metricas:
    build: ./metricas
    container_name: tarea1_metricas
    environment:
      LATENCY_WINDOW: 5000
      SNAPSHOT_DIR: /snapshots
      CACHE_STATS_URL: http://cache_api:5000/stats
      USE_KAFKA: ${USE_KAFKA:-false}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./snapshots:/snapshots
    ports:
      - "5002:5002"
    depends_on:
      cache_api:
        condition: service_healthy

  generador_trafico:
    build: ./generador_trafico
    container_name: tarea1_trafico
    environment:
      CACHE_URL: http://cache_api:5000
      USE_KAFKA: ${USE_KAFKA:-false}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "5003:5003"
    depends_on:
      cache_api:
        condition: service_healthy
      metricas:
        condition: service_started
      kafka:
        condition: service_started